<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireTrue — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F8FAFC;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:440px;box-shadow:0 4px 24px rgba(0,0,0,0.08);border:1px solid #E2E8F0}
.logo{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;color:#0A1628;text-align:center;margin-bottom:8px}
.logo span{color:#F5620F}
.subtitle{text-align:center;color:#64748B;font-size:15px;margin-bottom:28px}
.tabs{display:flex;background:#F1F5F9;border-radius:10px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:10px;border:none;background:transparent;font-size:14px;font-weight:600;color:#64748B;cursor:pointer;border-radius:8px;font-family:'Inter',sans-serif;transition:all .2s}
.tab.active{background:#fff;color:#0A1628;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.form-group{margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
label{display:block;font-size:13px;font-weight:600;color:#0A1628;margin-bottom:6px}
input{width:100%;padding:12px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;color:#0A1628}
input:focus{border-color:#3B72F6}
input::placeholder{color:#94A3B8}
.btn{width:100%;padding:14px;border-radius:10px;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;margin-top:8px}
.btn-main{background:#0A1628;color:#fff}
.btn-main:hover{background:#1a2f4a}
.btn-main:disabled{opacity:0.6;cursor:not-allowed}
.btn-google{background:#fff;color:#0A1628;border:1.5px solid #E2E8F0;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px}
.btn-google:hover{background:#F8FAFC;border-color:#CBD5E1}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.divider-line{flex:1;height:1px;background:#E2E8F0}
.divider-text{font-size:13px;color:#94A3B8}
.msg{padding:12px 16px;border-radius:10px;font-size:14px;font-weight:500;margin-bottom:16px;display:none}
.msg-error{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
.msg-success{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0}
.switch{text-align:center;font-size:14px;color:#64748B;margin-top:20px}
.switch a{color:#F5620F;font-weight:600;cursor:pointer;text-decoration:none}
.forgot{text-align:right;margin-bottom:16px}
.forgot a{font-size:13px;color:#1B4FD8;text-decoration:none}
.success-box{text-align:center;display:none}
.success-box h2{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;color:#0A1628;margin:16px 0 8px}
.success-box p{color:#64748B;font-size:15px;margin-bottom:24px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Hire<span>True</span></div>
  <p class="subtitle">Get hired on merit, not luck.</p>

  <!-- TABS -->
  <div class="tabs" id="tabs">
    <button class="tab active" onclick="showTab('signup')">Sign Up</button>
    <button class="tab" onclick="showTab('login')">Sign In</button>
  </div>

  <!-- MESSAGE -->
  <div class="msg msg-error" id="msg-error"></div>
  <div class="msg msg-success" id="msg-success"></div>

  <!-- SIGN UP -->
  <div id="signup-form">
    <button class="btn btn-google" onclick="googleLogin()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
    <div class="divider"><div class="divider-line"></div><span class="divider-text">or use email</span><div class="divider-line"></div></div>
    <div class="form-row">
      <div><label>First name</label><input type="text" id="s-first" placeholder="Rahul"></div>
      <div><label>Last name</label><input type="text" id="s-last" placeholder="Verma"></div>
    </div>
    <div class="form-group"><label>Email</label><input type="email" id="s-email" placeholder="rahul@gmail.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="s-pass" placeholder="Min. 8 characters"></div>
    <button class="btn btn-main" id="btn-signup" onclick="signUp()">Create my account →</button>
    <p class="switch">Already have an account? <a onclick="showTab('login')">Sign in</a></p>
  </div>

  <!-- SIGN IN -->
  <div id="login-form" style="display:none">
    <button class="btn btn-google" onclick="googleLogin()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
    <div class="divider"><div class="divider-line"></div><span class="divider-text">or use email</span><div class="divider-line"></div></div>
    <div class="form-group"><label>Email</label><input type="email" id="l-email" placeholder="rahul@gmail.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="l-pass" placeholder="Your password"></div>
    <div class="forgot"><a onclick="forgotPass()">Forgot password?</a></div>
    <button class="btn btn-main" id="btn-login" onclick="signIn()">Sign in →</button>
    <p class="switch">No account? <a onclick="showTab('signup')">Sign up free</a></p>
  </div>

  <!-- SUCCESS -->
  <div class="success-box" id="success-box">
    <div style="font-size:48px">🎉</div>
    <h2>You're in!</h2>
    <p>Your HireTrue account is ready. Let's build your career profile.</p>
    <button class="btn btn-main" onclick="window.location.href='dashboard.html'">Go to Dashboard →</button>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const SUPABASE_URL = 'https://oeuxvhxafzanmmmswtck.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ldXh2aHhhZnphbm1tbXN3dGNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODM0NDMsImV4cCI6MjA5Njg1OTQ0M30.Xhkx-b43hrYmlh7eRGR5tkHqXIgjEy_ICcWVo2SYy94'
const db = createClient(SUPABASE_URL, SUPABASE_KEY)

function showError(msg) {
  const el = document.getElementById('msg-error')
  el.textContent = '⚠️ ' + msg
  el.style.display = 'block'
  document.getElementById('msg-success').style.display = 'none'
}

function showSuccess(msg) {
  const el = document.getElementById('msg-success')
  el.textContent = '✅ ' + msg
  el.style.display = 'block'
  document.getElementById('msg-error').style.display = 'none'
}

function clearMsgs() {
  document.getElementById('msg-error').style.display = 'none'
  document.getElementById('msg-success').style.display = 'none'
}

window.showTab = function(tab) {
  clearMsgs()
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none'
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none'
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'signup' && i === 0) || (tab === 'login' && i === 1))
  })
}

window.signUp = async function() {
  clearMsgs()
  const first = document.getElementById('s-first').value.trim()
  const last = document.getElementById('s-last').value.trim()
  const email = document.getElementById('s-email').value.trim()
  const pass = document.getElementById('s-pass').value

  if (!first || !last) return showError('Please enter your first and last name.')
  if (!email) return showError('Please enter your email.')
  if (pass.length < 8) return showError('Password must be at least 8 characters.')

  const btn = document.getElementById('btn-signup')
  btn.disabled = true
  btn.textContent = 'Creating account...'

  const { data, error } = await db.auth.signUp({ email, password: pass, options: { data: { full_name: first + ' ' + last } } })

  if (error) {
    btn.disabled = false
    btn.textContent = 'Create my account →'
    return showError(error.message)
  }

  if (data.user) {
    await db.from('users').insert({ id: data.user.id, full_name: first + ' ' + last, email })
    document.getElementById('signup-form').style.display = 'none'
    document.getElementById('tabs').style.display = 'none'
    document.querySelector('.subtitle').style.display = 'none'
    document.getElementById('success-box').style.display = 'block'
    document.getElementById('success-box').querySelector('h2').textContent = 'Welcome, ' + first + '! 🎉'
  }
}

window.signIn = async function() {
  clearMsgs()
  const email = document.getElementById('l-email').value.trim()
  const pass = document.getElementById('l-pass').value

  if (!email) return showError('Please enter your email.')
  if (!pass) return showError('Please enter your password.')

  const btn = document.getElementById('btn-login')
  btn.disabled = true
  btn.textContent = 'Signing in...'

  const { data, error } = await db.auth.signInWithPassword({ email, password: pass })

  if (error) {
    btn.disabled = false
    btn.textContent = 'Sign in →'
    return showError('Incorrect email or password.')
  }

  showSuccess('Signed in! Taking you to dashboard...')
  setTimeout(() => window.location.href = 'dashboard.html', 1500)
}

window.googleLogin = async function() {
  const { error } = await db.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://phenomenal-marzipan-7bf7b0.netlify.app/dashboard.html' }
  })
  if (error) showError(error.message)
}

window.forgotPass = async function() {
  const email = document.getElementById('l-email').value.trim()
  if (!email) return showError('Enter your email first, then click forgot password.')
  const { error } = await db.auth.resetPasswordForEmail(email)
  if (error) return showError(error.message)
  showSuccess('Password reset email sent! Check your inbox.')
}
</script>
</body>
</html>
